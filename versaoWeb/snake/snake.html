<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake</title>
    <link rel="stylesheet" href="snake.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <button id="btn-back-menu" class="btn-back">◀ VOLTAR</button>
            <div class="score-container">
                <span class="score-label">SCORE</span>
                <span id="score-text" class="score-value">0000</span>
            </div>
        </div>

        <canvas id="snakeCanvas" width="400" height="400"></canvas>

        <footer class="controls-footer">
            <p class="instruction-text">Use as teclas <span class="key">'W'</span>, <span class="key">'A'</span>, <span class="key">'S'</span> e <spa class="key">'D'</span> para mover a cobra</p>
        </footer>
    </div>

    <script src="snake.js"></script>
</body>
</html>
