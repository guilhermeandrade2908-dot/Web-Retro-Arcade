<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Retro Arcade Hub</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>
    <div class="arcade-container">
        <header class="arcade-header">
            <h1 class="neon-title">WEB RETRO ARCADE</h1>
            <p class="blink-text">INSIRA A FICHA PARA COMEÇAR</p>
        </header>

        <main class="arcade-cabinet">
            <div class="screen-glitch">
                <h2 class="menu-title">SELECIONE O JOGO QUE DESEJA JOGAR.</h2>

                <div class="button-panel">
                    <button class="arcade-btn btn-pong">
                        <span class="btn-icon">🏓</span> PONG
                    </button>
                    <button class="arcade-btn btn-space-invaders">
                        <span class="btn-icon">🚀</span> SPACE INVADERS
                    </button>
                    <button class="arcade-btn btn-snake">
                        <span class="btn-icon">🐍</span> SNAKE GAME
                    </button>
                </div>
            </div>
        </main>

        <footer class="arcade-footer">
            <p class="credit-text">CREDITOS: 99 &nbsp;&nbsp;&nbsp; PLAYER 1 READY!</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
