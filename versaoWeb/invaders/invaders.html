<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Invaders</title>
    <link rel="stylesheet" href="invaders.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>
    <div class="arcade-conatainer">
        <div class="game-header">
            <div class="score-box">
                <span class="label">SCORE</span>
                <span id="score-text">0000</span>
            </div>
            <div class="lives-box">
                <span class="label">LIVES</span>
                <span id="lives-text">♥♥♥</span>
            </div>
        </div>

        <canvas id="spaceCanvas" width="600" height="750"></canvas>

        <div class="game-footer">
            <button id="btn-back-menu" class="btn-back">VOLTAR AO MENU</button>
        </div>
    </div>

    <script src="invaders.js"></script>
</body>
</html>
